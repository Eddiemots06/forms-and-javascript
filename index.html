<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Forms Tutorial Assignment</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">JOB APP FORM</h1>

<form name="jobForm" onsubmit="return validateForm()">

<fieldset>

<legend>Contact Information</legend>

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" id="username" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Telephone</label>
<input type="text" id="telephone" class="form-control">
</div>

</fieldset>

<hr>

<!-- Exercise 2 -->

<h4>Select Job Positions</h4>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Account Executive">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Business Development">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Inside Sales">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Sales Manager">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="VP Sales">
<label class="form-check-label">VP Sales</label>
</div>

<hr>

<!-- Exercise 3 -->

<h4>Position Details</h4>

<div class="mb-3">

<label class="form-label">Type of Position</label>

<select class="form-select">

<option>Account Executive</option>
<option>Business Development</option>
<option>Inside Sales</option>
<option>Sales Manager</option>
<option>VP Sales</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Willing to Relocate?</label><br>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">No</label>
</div>

</div>

<div class="mt-4">

<button class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>

</div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
